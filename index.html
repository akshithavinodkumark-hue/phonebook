<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phonebook App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">📞 Phonebook</h2>

    <!-- Form -->
    <div class="card p-3 mb-3">
        <input type="text" id="name" class="form-control mb-2" placeholder="Enter Name">
        <input type="text" id="phone" class="form-control mb-2" placeholder="Enter Phone">
        <button class="btn btn-primary" onclick="addContact()">Add Contact</button>
    </div>

    <!-- Search -->
    <input type="text" id="search" class="form-control mb-3" placeholder="Search..." onkeyup="searchContact()">

    <!-- Contact List -->
    <ul id="contactList" class="list-group"></ul>
</div>

<script src="js/script.js"></script>
</body>
</html>
